<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Minha Loja - Esqueleto</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header class="site-header">
        <h1>Minha Loja</h1>
        <button id="cart-toggle" class="cart-btn">Carrinho (<span id="cart-count">0</span>)</button>
    </header>

    <main>
        <section id="products" class="products-grid" aria-live="polite">
            <!-- Produtos serão carregados via JavaScript -->
        </section>
    </main>

    <aside id="cart" class="cart-panel" aria-hidden="true">
        <h2>Seu Carrinho</h2>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div>Subtotal: <strong id="cart-subtotal">R$ 0,00</strong></div>
            <button id="checkout-btn" class="primary">Finalizar compra</button>
            <button id="clear-cart" class="muted">Limpar</button>
        </div>
    </aside>

    <script src="assets/app.js"></script>
</body>
</html>
